<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      text-align: center;
      width: 300px;
    }
    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background: black;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
    }
    a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: underline;
      color: #333;
    }
    #reset-message {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>

  <!-- Firebase v8 CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
  <div class="container">
    <h2>Reset Your Password</h2>

    <label for="reset-email">Email Address</label>
    <input type="email" id="reset-email" placeholder="Enter your email" required>

    <button onclick="sendResetLink()">Send Reset Link</button>

    <p id="reset-message"></p>

    <a href="index.html">Back to Login</a>
  </div>

  <script>
    // firebase config
    const firebaseConfig = {
  apiKey: "AIzaSyByECWZi0yn6tbkPTABRAv4NlEjisQz3EM",
  authDomain: "software-c044b.firebaseapp.com",
  projectId: "software-c044b",
  storageBucket: "software-c044b.firebasestorage.app",
  messagingSenderId: "641724524236",
  appId: "1:641724524236:web:c8a300f49ad92561578469"
};

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Send reset email
    function sendResetLink() {
      const email = document.getElementById("reset-email").value.trim();
      const message = document.getElementById("reset-message");

      if (!email) {
        message.style.color = "red";
        message.textContent = "Please enter your email.";
        return;
      }

      auth.sendPasswordResetEmail(email)
        .then(() => {
          message.style.color = "green";
          message.textContent = "Reset link sent! Check your email.";
          console.log("Reset email sent to: " + email);
        })
        .catch((error) => {
          message.style.color = "red";
          message.textContent = "Error: " + error.message;
          console.error(error);
        });
    }
  </script>
</body>
</html>
